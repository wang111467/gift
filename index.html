<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        popup: {
                            lightpink: '#FFB6C1',
                            skyblue: '#87CEEB',
                            lightgreen: '#90EE90',
                            lavender: '#E6E6FA',
                            lightyellow: '#FFFFE0',
                            plum: '#DDA0DD',
                            coral: '#FF7F50',
                            bisque: '#FFE4C4',
                            aquamarine: '#7FFFD4',
                            mistyrose: '#FFE4E1',
                            honeydew: '#F0FFF0',
                            lavenderblush: '#FFF0F5',
                            oldlace: '#FDF5E6'
                        }
                    },
                    fontFamily: {
                        sans: ['Microsoft YaHei', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .popup-shadow {
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            }
            .popup-transition {
                transition: all 0.3s ease-out;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- 无控制元素 -->
<!--        <h1 class="text-center text-5xl md:text-7xl font-bold text-gray-800 py-16">葛舒晴</h1>-->
    </div>

    <script>
        class PopupManager {
            constructor() {
                this.running = false;
                this.interval = 0.3; // 弹窗间隔0.5秒
                this.popupIntervalId = null;

                this.tips = [
                    '多喝水~', '保持微笑~', '记得吃水果~', '保持好心情~',
                    '顺顺利利~', '早点休息~', '烦恼全消失~', '相信自己~',
                    '好好爱自己~', '工作加油~', '适当放松~','心想事成~',
                    '每天都要元气满满~', '美梦成真~', '别给自己太大压力~',
                    '一切都会如愿~', ' 保持满满的活力~', '好运常伴你左右~',
                    '保持好心态~', '今天也是努力的一天~', '累了就歇会儿~',
                    '空闲时伸个懒腰~', '心情也要放个假~', '一切都会如愿~',
                    '珍惜当下~', '努力成为更好的自己~', '保持乐观~','瘦到115~',
                    '每一天都是新的开始~', '别忘给生活加点甜~', '万事顺意~'
                ];

                this.bgColors = [
                    'bg-popup-lightpink', 'bg-popup-skyblue', 'bg-popup-lightgreen',
                    'bg-popup-lavender', 'bg-popup-lightyellow', 'bg-popup-plum',
                    'bg-popup-coral', 'bg-popup-bisque', 'bg-popup-aquamarine',
                    'bg-popup-mistyrose', 'bg-popup-honeydew', 'bg-popup-lavenderblush',
                    'bg-popup-oldlace'
                ];
            }

            showTip() {
                const popup = document.createElement('div');
                popup.className = 'fixed popup-shadow rounded-lg p-4 popup-transition transform translate-y-[-20px] opacity-0';

                const tip = this.tips[Math.floor(Math.random() * this.tips.length)];
                const bgColor = this.bgColors[Math.floor(Math.random() * this.bgColors.length)];

                popup.classList.add(bgColor);
                popup.innerHTML = `
                    <div class="flex items-center">
                        <i class="fa fa-star text-yellow-500 mr-2"></i>
                        <span class="font-medium text-gray-800">${tip}</span>
                    </div>
                `;

                document.body.appendChild(popup);

                const popupWidth = popup.offsetWidth || 250;
                const popupHeight = popup.offsetHeight || 60;
                const maxX = window.innerWidth - popupWidth;
                const maxY = window.innerHeight - popupHeight;
                const x = Math.floor(Math.random() * maxX);
                const y = Math.floor(Math.random() * maxY);

                popup.style.left = `${x}px`;
                popup.style.top = `${y}px`;
                setTimeout(() => {
                    popup.classList.remove('translate-y-[-20px]', 'opacity-0');
                }, 10);

                setTimeout(() => {
                    popup.classList.add('opacity-0', 'translate-y-[-20px]');
                    setTimeout(() => {
                        if (document.body.contains(popup)) {
                            document.body.removeChild(popup);
                        }
                    }, 300);
                }, 40000);
            }

            schedulePopups() {
                if (this.running) {
                    this.showTip();
                    this.popupIntervalId = setTimeout(() => {
                        this.schedulePopups();
                    }, this.interval * 1000);
                }
            }

            start() {
                if (this.running) {
                    this.stop();
                }
                this.running = true;
                this.schedulePopups();
            }

            stop() {
                this.running = false;
                if (this.popupIntervalId) clearTimeout(this.popupIntervalId);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const popupManager = new PopupManager();
            popupManager.start();
        });
    </script>
</body>
</html>
